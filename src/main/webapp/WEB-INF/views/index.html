<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
</head>

<style>
    table, th, td {
      border:1px solid black;
    }
</style>

<body>
<h1>Меню</h1>

<form th:action="@{/transferSelections}" method="post">
    <h3>Выберите блюда для заказа</h3>
    <div th:each="dishDTO : ${dishDTOS}">
        <input type="checkbox"
               th:name="selectedDishes"
               th:value="${dishDTO.id}"
               <!--th:id=" 'dishDTO_' + ${dishDTO.id}">-->
        <label th:for=" 'dishDTO_' + ${dishDTO.id}" th:text="${dishDTO.name} + ' ' + ${dishDTO.price}"></label>

        <select th:name="'quantity_' + ${dishDTO.id}">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    </div>
    <button type="submit">Оформить заказ</button>
</form>

</body>
</html>
